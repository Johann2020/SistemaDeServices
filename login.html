<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingresar - Sistema de Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel">
        <div class="auth-brand">
          <span>S</span>
          <div>
            <strong>Services</strong>
            <small>Gestion tecnica en la nube</small>
          </div>
        </div>

        <div class="auth-tabs" role="tablist">
          <button class="active" type="button" data-auth-mode="login">Ingresar</button>
          <button type="button" data-auth-mode="register">Registrarse</button>
        </div>

        <form class="auth-form" id="auth-form" autocomplete="off">
          <label class="auth-name-field hidden">
            Nombre
            <input id="auth-name" autocomplete="off">
          </label>
          <label>
            Email
            <input id="auth-email" type="email" autocomplete="off" required>
          </label>
          <label>
            Clave
            <input id="auth-password" type="password" autocomplete="off" required>
          </label>
          <p class="auth-message" id="auth-message"></p>
          <p class="auth-error" id="auth-error"></p>
          <button class="primary-action" type="submit" id="auth-submit">Ingresar</button>
        </form>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
